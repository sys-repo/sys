  sequence:
    - video: /:core-videos/core 3.1.3 the-three-circles-model.webm.02.mp4.webm
      slice: 00:00..05:15
      script: >
        [00:00:00] As a founder, one of your key jobs is to decide what to
        prioritize and how much you try and do right at the start.

        [00:00:07] There's a natural temptation to make your business model look
        as impressive as possible.

        [00:00:12] Multiple customer segments. Different product offerings.
        Various revenue streams. More equals better, right? Wrong.

        [00:00:20] There's a trap here. The more complex your business model is
        at the start, the more time and resources it will take to validate it.

        [00:00:27] Complexity adds risk and risks need to be validated.

        [00:00:31] What makes a business model look good on paper often makes it
        impossible to validate in practice.

        [00:00:37] You end up testing everything at once, getting conflicting
        signals from different customers wanting different things, and burning
        through time and money.

        [00:00:46] For purpose-driven ventures, this is especially dangerous.

        [00:00:50] You're already juggling a traditional business model and an
        impact model.

        [00:00:54] Adding unnecessary complexity on top of this is a recipe for
        failure.

        [00:00:59] You need a way to simplify and focus on what actually matters
        for success.

        [00:01:03] The Three Circles Model helps you strip away everything that
        doesn't need to be there right now.

        [00:01:09] It consists of, you guessed it, three circles: Success, MVP,
        and Fantasy.

        [00:01:16] The Success circle in the middle represents your core idea,
        the thing that you think can work.

        [00:01:21] That is, it can deliver your impact and your financial goals.

        [00:01:25] This is what needs to be true for your venture to succeed.

        [00:01:29] The MVP circle - which stands for Minimum Viable Product - is
        where you include your experiments and early versions of your product or
        service that will prove that your Success model is viable.

        [00:01:41] These are the tests that validate your core assumptions.

        [00:01:45] The Fantasy circle is for everything else, all those
        nice-to-haves, things that will be great, but you don't need them for
        you to get to success.

        [00:01:54] These ideas live here, and you'll revisit them once you've
        made your core model work.

        [00:01:58] But you won't burn time, money, and effort validating them in
        the early stages because you don't need them.

        [00:02:05] Here's the key principle. Only what's in your Success circle
        needs to be in your Social Lean Canvas right now.

        [00:02:11] Everything else is distraction.

        [00:02:14] When you're validating, you're testing whether your Success
        circle works. Once it's working, you can expand, but not before.

        [00:02:22] Let's look at Facebook as an example. They're not a
        purpose-driven venture, but how they developed in the early days makes
        them a good case study.

        [00:02:29] At the start, their Success circle was simple. Become the
        largest social network on global university campuses.

        [00:02:37] That was it. Not for everyone, just for university students.

        [00:02:42] The MVP circle was even more focused. Harvard University
        first, and then a few other American universities.

        [00:02:49] This was to prove that for university students, their
        business model was right and could get to success.

        [00:02:54] In their Fantasy circle, you could put all the things that
        they would eventually achieve, all the customer segments beyond students
        that they would reach.

        [00:03:03] Building an identity platform, a gaming platform. Launching a
        digital currency, building AI, VR glasses, all of that.

        [00:03:12] If they had added all of these into their Success circle,
        they never would've been able to build an MVP to test them.

        [00:03:18] They would've burned up all their time and money getting
        conflicting signals from different customers wanting different things,
        and they would've failed.

        [00:03:26] Instead, they focused on students, campuses, one at a time to
        prove it worked, and then expand into where they are today.

        [00:03:35] That's how Facebook became Facebook. Not by doing everything
        at once, but by doing one thing well, validating it, and then expanding.

        [00:03:43] Apply this to your venture.

        [00:03:45] Look at your current business model and ask yourself three
        questions.

        [00:03:49] What's genuinely needed for success?

        [00:03:52] What has to work for this venture to deliver impact and
        achieve financial sustainability? That goes in your Success circle.

        [00:03:59] What experiments will prove your Success circle works? That's
        your MVP circle.

        [00:04:04] Everything that can wait until after you've validated your
        core model? That goes into Fantasy.

        [00:04:11] Be honest with yourself. Many things can wait.

        [00:04:14] That extra customer segment you think would be nice to serve.
        Fantasy circle.

        [00:04:18] That additional feature that sounds cool. Fantasy circle.

        [00:04:21] That secondary revenue stream, unless you need it for your
        core success model to be viable, Fantasy circle.

        [00:04:29] When you're filling in your Social Lean Canvas, focus only on
        the components that live in your Success circle.

        [00:04:36] Your MVP experiments become your validation strategy. We'll
        cover that in the Strategy module.

        [00:04:41] You don't need to fill out the Three Circles Model itself.
        It's a thinking tool.

        [00:04:45] It will help you decide what goes in your canvas and what
        experiments you'll run in your validation strategy.

        [00:04:51] But do make a list of your Fantasy ideas somewhere. Keep them
        safe. You'll come back to them.

        [00:04:57] Don't let them distract you from validating what actually
        matters.

        [00:05:00] Remember, for purpose-driven ventures, you already have the
        complexity of integrating impact with a customer model and an economic
        model.

        [00:05:08] Don't make it harder by adding unnecessary pieces.

        [00:05:12] Simplify, focus, validate your core, then expand.
