data:
  sequence:
    - video: /:core-videos/core 3.1.4 the-venture-example-library.webm.02.mp4.webm
      slice: 00:00..01:35
      script: >
        [00:00:00] Understanding business model design in theory is one thing.

        [00:00:03] Seeing it work in practice is another.

        [00:00:05] Throughout this program, you'll have access to the Venture
        Example Library, a collection of case studies of real purpose-driven
        ventures that have built successful, impactful business models.

        [00:00:16] Each example gives you three things: an outline of how the
        venture works, a complete walkthrough of their Social Lean Canvas
        showing how their customer, impact, and economic models work together,
        and a detailed look at their impact model.

        [00:00:29] You can access these examples at any time throughout the
        program.

        [00:00:33] Use them to see how different organizations applied the tools
        and techniques we're covering.

        [00:00:38] You'll see patterns in how ventures design their business
        models.

        [00:00:41] You'll see different approaches to creating and capturing
        value.

        [00:00:45] And you'll learn from the choices and trade-offs that they
        made along the way.

        [00:00:49] We'll reference specific venture examples throughout the
        program when they illustrate a particular concept.

        [00:00:55] But don't wait for us. Explore them on your own.

        [00:00:57] See what resonates. See what surprises you.

        [00:01:00] The library is there to support your learning whenever you
        need it.

        [00:01:03] These core principles will help you make sense of your
        journey through the Social Lean Canvas.

        [00:01:08] The journey from an early model full of untested assumptions
        and risks to a validated, repeatable, scalable business model.

        [00:01:16] You now understand what a business model is.

        [00:01:18] You know why design beats guesswork.

        [00:01:21] You understand the startup journey from search to execution.

        [00:01:25] You know your responsibilities as founders. You have the
        Three Circles Model to help keep your business model focused on what
        matters.

        [00:01:32] Now you're ready to start mapping your business model in the
        Social Lean Canvas.
