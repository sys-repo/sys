  sequence:
    - video: /:p2p-videos/p2p 3.2.2 customer-model 1.webm.02.mp4.webm
      script: >
        [00:00:00] Next, you're going to work through the Core content on the
        Customer Model.

        [00:03:03] This is where you map out how you create value for your
        customers.

        [00:07:07] This is the foundation of your business model.

        [00:09:09] The Core Framework walks you through four key sections:
        Customers, Jobs to be Done,

        [00:15:15] Unique Value Proposition, and Solution.

        [00:18:18] You'll see how these four pieces fit together into a single
        coherent system.

        [00:24:24] The Core content uses the term "social enterprise" quite
        broadly,

        [00:28:28] so just bear this in mind. This includes P2P ventures like
        yours.

        [00:32:32] After you've gone through the Core Framework, we'll come back

        [00:35:35] and talk about what matters specifically for P2P ventures.
