    - video: /:p2p-videos/p2p 3.2.2 customer-model 2.webm.02.mp4.webm
      script: >
        [00:00:00] The Core Framework just walked you through the Customer
        Model—how to identify customers, understand their jobs to be done, craft
        unique value propositions, and design solutions.

        [00:10:10] Now, let's talk about what this means with a P2P flavour.

        [00:15:15] First, a bit of a mindset shift.

        [00:17:17] For P2P ventures, small can be better.

        [00:21:21] Kevin Kelly's concept of "1,000 True Fans" gives us a useful
        lens here.

        [00:26:26] You don't need millions of customers to build a viable
        venture.

        [00:30:30] You need a minimum viable audience.

        [00:33:33] People willing to directly support what you're building
        through subscriptions, purchases, memberships—whatever fits your model.

        [00:40:40] For a Purpose Pivot Venture, this is strategic.

        [00:43:43] Going narrow and deep with a niche group who really value
        what you can offer can be more powerful than trying to go broad,
        especially when you're a solo or small team.

        [00:55:55] Remember, you're building a machine—not just selling your
        time, not just being labour.

        [01:01:01] For your machine to be scalable and repeatable, it needs a
        reliable way to create value.

        [01:06:06] Your customer model does this by stringing together:
        identifiable customers,

        [01:10:10] jobs they need done,

        [01:13:13] value propositions they'll engage with,

        [01:15:15] and solutions that will deliver.

        [01:17:17] All four pieces need to work together elegantly.

        [01:21:21] If one piece is weak, the whole model struggles.

        [01:25:25] Be particularly aware of complexity in your customer model.

        [01:28:28] The more complex your model, the more difficult and expensive
        it will be to validate.

        [01:32:32] More customer types means multiplied work.

        [01:36:36] Each customer type has its own jobs to be done, its own value
        proposition.

        [01:40:40] You have to validate each one separately.

        [01:43:43] More complexity, more validation work, and more risk of
        getting things wrong.

        [01:49:49] Let's look at a couple of examples from the library to better
        understand this.

        [01:54:54] Plausible Analytics keeps it simple.

        [01:56:56] Single customer type—privacy-conscious developers who need
        web analytics.

        [02:01:01] Their flow: developers frustrated with Google
        Analytics—that's the customer.

        [02:07:07] Need privacy-respecting analytics—that's the job to be done.

        [02:11:11] That doesn't compromise on features—that's the UVP.

        [02:15:15] Delivered through a lightweight, open-source tool—that's the
        solution.

        [02:19:19] Clean. One customer type, one clear flow. Solo founder
        viable.

        [02:25:25] Ridwell is a little more complex.

        [02:27:27] They have two customer types: households who want to recycle
        hard-to-recycle items, and city/waste partners who need better recycling
        solutions.

        [02:37:37] Each type has different jobs to be done, different value
        propositions.

        [02:41:41] The household customer wants convenience and environmental
        impact.

        [02:46:46] The city partner wants cost reduction and sustainability
        metrics.

        [02:51:51] Two distinct flows that have to work together.

        [02:54:54] Does Ridwell need this complexity?

        [02:57:57] Probably. Their model requires it, so they will have gone in
        eyes open knowing they have to validate and serve two different customer
        types.

        [03:06:06] If you are adding a second or more customer types, ask hard
        questions about whether you really need it.

        [03:14:14] Sometimes you do. Just understand you're signing up for
        multiplied work and risk.

        [03:20:20] When you're choosing customer segments as a solo or small
        venture, you'll probably face some constraints.

        [03:26:26] Channel constraints.

        [03:27:27] For example, a solo founder will find it hard to do
        high-touch enterprise sales calls.

        [03:33:33] You won't be able to afford a sales team.

        [03:36:36] You need customers who can find you through content
        marketing, SEO, community, word of mouth—channels that can automate or
        scale without you needing to be everywhere at once.

        [03:49:49] Choose customers who value small.

        [03:51:51] Some segments actively prefer solo or small teams.

        [03:55:55] They get faster response times, more specialised expertise,
        personal touch.

        [04:01:01] Others want the appearance of a big company.

        [04:03:03] Pick segments that work with what you are.

        [04:08:08] Look for async communication opportunities.

        [04:11:11] You can't be available 24/7.

        [04:13:13] Customers who expect instant support or constant handholding
        are tough to serve solo.

        [04:19:19] Choose segments and use cases where asynchronous
        communication can be accepted.

        [04:26:26] Not all P2P ventures will have well-developed purpose
        narratives.

        [04:30:30] You might be doing this for yourself and your family, and
        that story might not strengthen your business model beyond improving
        your own motivation.

        [04:39:39] But if your purpose can play a role in the attractiveness of
        your solution, the Customer Model is where this shows up.

        [04:45:45] For our example of Buy Me Once, the desire for sustainable
        products is the core engine of value creation for customers—it also
        delivers the impact model for the venture.

        [04:56:56] Purpose is integral to the value proposition that drives
        customers to engage.

        [05:02:02] For Plausible Analytics, their mission to solve surveillance
        capitalism problems folds directly into their value proposition as well.

        [05:10:10] "Privacy without sacrifice" and "transparency through open
        source."

        [05:15:15] If your authentic voice and commitment to purpose can
        strengthen your value proposition, lean into it.

        [05:21:21] If not, that's fine too.

        [05:23:23] Modern AI and digital tools make solo customer models viable
        in ways that they just weren't five years ago.

        [05:30:30] Content creation, customer research, marketing, logistics.

        [05:35:35] You can leverage tools to do work that used to require whole
        teams.

        [05:39:39] We'll dive deeper into the specific tools and approaches in
        Module 4, where we'll be working on improving your business model.

        [05:46:46] But for now, just know that being solo doesn't mean you have
        to do everything manually.

        [05:51:51] So keep it simple on your first pass of the canvas.

        [05:54:54] Get the basics down: Customers, Jobs, Value Proposition,
        Solution.

        [05:59:59] If you're adding multiple customer types, pause and ask if
        you really need them.

        [06:04:04] The complexity might be necessary, but go in with your eyes
        open.

        [06:08:08] Check out the P2P Example Library to see how different
        ventures mapped their customer models.

        [06:14:14] The Core Example Library has additional examples showing
        various different approaches as well.
