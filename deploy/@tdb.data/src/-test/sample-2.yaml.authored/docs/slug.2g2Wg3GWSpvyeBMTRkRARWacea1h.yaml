data:
  sequence:
    - video: /:core-videos/purpose.webm.02.mp4.webm
      slice: 00:00..00:57
      script: >
        [00:00:00] Your purpose is the starting point for your canvas.

        [00:00:03] It's your reason for creating this enterprise.

        [00:00:07] It needs to be clearly defined in terms of the social or
        environmental problems that you want to solve.

        [00:00:15] So for the purpose section of the canvas, you need to craft a
        solid purpose statement.

        [00:00:20] This purpose statement should be, firstly, inspirational - to
        inspire you and others.

        [00:00:26] It should be simple, clear, and concise and easy to
        understand.

        [00:00:31] It should be high level. This is not about describing the
        detail of exactly what you're going to do.

        [00:00:37] It's a broad statement about your intentions.

        [00:00:41] And finally, your purpose statement needs to be based around
        the fundamental social or environmental problem that you are trying to
        solve here.

        [00:00:50] So pull together these points. Make a clear purpose statement
        that you can understand and that others will understand as well.
      timestamps:
