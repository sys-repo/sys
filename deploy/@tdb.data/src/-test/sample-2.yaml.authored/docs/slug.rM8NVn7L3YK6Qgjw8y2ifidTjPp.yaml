      slice: 00:00..01:15
      script: >
        [00:00:00] Before we dive into filling in your business model in the
        Social Lean Canvas, it's important that we understand what a business
        model actually is and how the journey of creating a successful one
        actually works.

        [00:00:12] If you're considering leaving your job and pivoting to
        purpose, getting these fundamentals right isn't optional—it's critical.

        [00:00:17] When you're bootstrapping solo or with a small team to build
        a venture, you can't afford to waste time, money, or energy guessing at
        a business model.

        [00:00:25] You don't have the safety net of a large team or investor
        capital to cover mistakes.

        [00:00:32] Getting the business model fundamentals right is your
        foundation for the journey ahead.

        [00:00:39] You're about to work through the Core content on business
        model design.

        [00:00:43] These are the universal frameworks that apply to any venture.

        [00:00:47] The Core Framework will walk you through what a business
        model is, why design beats guesswork, and the critical distinction
        between a startup and a business.

        [00:01:00] After the Core content, we'll come back and talk about what
        makes P2P ventures different from other paths of venture building, like
        high-growth startups and social enterprises, which is covered in the
        Core content.

        [00:01:08] We'll also introduce resources that you can return to
        throughout the program to make sense of your specific journey.
