    - video: /:p2p-videos/p2p 3.2.1 purpose 1.webm.02.mp4.webm
      slice: 00:00..01:01
      script: >
        [00:00:00] Making a purpose pivot into building your own venture isn't
        easy.

        [00:00:04] When things get tough and they will get tough, you'll doubt
        yourself or you'll doubt your ideas, or worse, you'll push ahead in the
        wrong direction.

        [00:00:12] If you're not anchored to something solid, engaging your
        purpose gives you a foundation.

        [00:00:18] It supports you through the venture building journey, and it
        helps you communicate to others, to collaborators, customers, investors,
        why this matters, why they should engage with what you're doing and back
        you to do it.

        [00:00:31] Purpose keeps you aligned. When things get tough.

        [00:00:34] It makes your marketing clear and compelling, when you put
        purpose into your work, you get to be a fuller version of yourself.

        [00:00:41] Who wants to go through the difficulty of pivoting to
        building their own venture if it doesn't allow them to more fully embody
        their values, passion and vision in the world.

        [00:00:51] Next, you'll work through the core content on purpose.

        [00:00:55] After that, we'll come back and talk about what purpose means
        specifically for P two P ventures.
