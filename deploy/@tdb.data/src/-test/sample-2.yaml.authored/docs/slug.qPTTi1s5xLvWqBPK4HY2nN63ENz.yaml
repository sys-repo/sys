      slice: 00:00..04:25
      script: >
        [00:00:00] The core framework showed you how to craft your purpose
        statement.

        [00:00:04] Now let's talk about what purpose means for you when you're
        building a P two P venture.

        [00:00:09] You may be deep in the social enterprise space and developing
        a detailed impact model, a full theory of change, measurable outcomes,
        the whole thing, or your purpose might be building something that can
        reliably feed your family and allow you to contribute to your community,
        creating a better life for you and the people close to you, or somewhere
        in between.

        [00:00:31] When you pivot to building your own thing, you get to fold
        more of yourself into it.

        [00:00:37] You're no longer spending the most productive years of your
        life working on things that don't matter to you, making other people
        rich.

        [00:00:43] You get to decide what matters.

        [00:00:45] When you put more of yourself into your venture, it gets more
        of your energy, inspiration, sweat and love.

        [00:00:52] You become a fuller, more integrated version of yourself and
        your venture benefits from this.

        [00:00:58] There's also a deeper design reason to integrate purpose into
        your venture.

        [00:01:02] Most businesses ignore this, and it's a large reason why the
        world is in the sorry state it is in today.

        [00:01:09] Design is never neutral.

        [00:01:11] Systems always encode values.

        [00:01:13] If you don't explicitly design for a value, a combination of
        defaults, constraints and incentives will work against that value.

        [00:01:22] Much of the harm in the world today is not intentional.

        [00:01:25] It's systems that weren't deliberately designed to protect
        the things that we value, what they were designed to achieve.

        [00:01:32] Growth and profit cause them to evolve in ways that are
        destructive to things that we value in society and in the environment.

        [00:01:41] 20th century businesses created massive environmental
        destruction, not because they set out to harm the environment, but
        because they didn't set out explicitly intending not to harm the
        environment.

        [00:01:53] The incentives around what they did intend to do, grow the
        business and make money for shareholders, caused them to make thousands
        of small decisions that resulted collectively in environmental
        destruction.

        [00:02:07] This is why a slogan like Don't Be Evil doesn't stop complex
        systems like modern corporations from producing destructive outcomes.

        [00:02:16] You need to consciously decide what values and outcomes to
        prioritize alongside growth and profit, then actively designed to ensure
        that those outcomes are prioritized.

        [00:02:28] This is why Internet hustle culture feels so icky.

        [00:02:31] It prioritizes personal success and nothing else, which
        really means prioritizing personal success at the expense of everything
        else.

        [00:02:41] Honest Hustle is about bringing energy, tenacity, hard work,
        and smart thinking, but also knowing what we stand for and not
        compromising on this not accidentally hurting people or our planet.

        [00:02:54] Because we never considered that an action may have a
        consequence.

        [00:02:58] So even if your purpose isn't about an explicit social or
        environmental mission, you still need to understand what you stand for,
        what matters to you, and how you want to be in the world as you build
        your venture.

        [00:03:11] Your purpose will shape every decision you make when things
        get hard.

        [00:03:15] It'll make sure that you stand firm on what's important to
        you and find a way to succeed without selling your soul.

        [00:03:23] Let's take a look at what purpose looks like at different
        points across the purpose spectrum.

        [00:03:28] Looking in the P two P example library, you can see that Nest
        Labs has a clear educational and community mission.

        [00:03:35] Red well built itself around local environmental impact
        design.

        [00:03:40] Joy focused on creative freedom and quality work, different
        expressions of purpose, all legitimate.

        [00:03:47] The core example library shows purpose-driven ventures across
        an even wider range, including many social enterprises with
        comprehensive impact models.

        [00:03:57] how to capture this.

        [00:03:58] If you're working with others, discuss your purpose and make
        sure you're all aligned.

        [00:04:02] Get on the same page early.

        [00:04:04] Keep it simple and powerful.

        [00:04:06] Create a high level description of why this matters.

        [00:04:09] Capture that in your canvas along with any brief explanation
        that helps people understand it.

        [00:04:16] Document your purpose, capture it in your canvas.

        [00:04:18] This becomes your north star.

        [00:04:20] The thing that you come back to when you're doubting, when
        decisions get hard and when you need to remember why you're doing this.
