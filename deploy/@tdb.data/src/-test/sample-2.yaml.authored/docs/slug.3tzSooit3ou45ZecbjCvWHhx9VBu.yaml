  sequence:
    - video: /:p2p-videos/p2p 3.2.4 economic-model 1.webm.02.mp4.webm
      script: >
        [00:00:00] Now you're about to work through the Core content on the
        Economic Model.

        [00:00:04] This shows how your enterprise turns the value you create for
        customers

        [00:00:08] into an engine that powers your whole venture—your business
        and your impact.

        [00:00:13] The Core Framework walks you through channels, revenue,
        costs, and advantage.

        [00:00:18] How to reach your customers at scale, how money works in your
        model, and where your leverage comes from.

        [00:00:24] After the Core content, we'll come back and talk about what
        economic models look like for P2P ventures—

        [00:00:33] specifically solo or small team operations with fundamentally
        different cost structures and leverage points.
