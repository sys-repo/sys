title: 3.2.4 Economic Model
description: Learn how to reach customers at scale, build financial
  sustainability, and identify the leverage that makes your business model
  successful. Includes Facebook example walkthrough.
traits:
  - of: media-composition
    as: sequence
  - of: slug-list
    as: solo
alias:
  :index: crdt:21JvXzARPYFXDVMag3x4UhLgHcQi
