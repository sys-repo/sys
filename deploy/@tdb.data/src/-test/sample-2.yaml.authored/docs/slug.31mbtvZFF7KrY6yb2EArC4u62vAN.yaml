    - video: /:core-videos/core 3.2.6-conclusion.webm.02.mp4.webm
      slice: 00:00..02:11
      script: >
        [00:00:00] Great work! You've filled in your Social Lean Canvas.

        [00:02:73] This is an achievement worth acknowledging.

        [00:05:03] Most entrepreneurs never get to this level of clarity.

        [00:08:45] They're just running on faith and instinct, hoping that their
        idea will just work if they build it.

        [00:14:44] You've created a conceptual foundation—something you can
        test, improve, and evolve into a successful business model.

        [00:22:58] This level of clarity is rare in the haphazard world of
        venture building.

        [00:26:81] Well done.

        [00:27:86] You have a clear sketch of your business model in one place.

        [00:31:61] Your purpose, customer model, impact model, economic model,
        and key metrics.

        [00:36:30] All connected and all visible.

        [00:38:53] And you have a tool.

        [00:39:88] You can take this canvas and talk it through with advisors,
        mentors, potential collaborators, and funders.

        [00:45:73] Get their perspectives, find out where your thinking might be
        off, and discover gaps you haven't seen yet.

        [00:51:96] The canvas makes those conversations productive.

        [00:54:56] Instead of vague ideas, you have something concrete to
        discuss and refine.

        [00:59:65] You've built the foundation—the conceptual structure that
        everything else builds on.

        [01:03:70] Now you can build on it.

        [01:05:80] Having completed your canvas might be all you need for now.

        [01:09:10] Your next moves might be obvious.

        [01:11:25] You can pull together a plan and start executing.

        [01:14:36] Or you might have realised, through mapping things out, that
        this particular idea isn't good enough—and that you're better off
        tossing it and starting again.

        [01:22:19] This can be a win too.

        [01:24:12] Alternatively, you may be left with some big questions.

        [01:27:14] Like: How do I know if this business model is actually good
        enough to work on?

        [01:30:34] And if it has potential but isn't good yet, how do I improve
        it?

        [01:34:55] Or: What are the steps to actually build this in the real
        world?

        [01:39:17] If you're holding questions like these, you should work
        through Build—our follow-on program—where I'll walk you through
        assessing your business model, making it stronger, and developing a
        strategy to build your venture.

        [01:50:57] Build does have a cost. That's how we keep the program you've
        just completed free and open to everyone.

        [01:56:14] If you can't afford to pay, just let us know and we'll cover
        it.

        [01:59:35] No one misses out because of money.

        [02:01:25] People who can pay are paying it forward for those who can't.

        [02:03:42] However you choose to proceed—well done.

        [02:07:38] Completing your canvas is a big step towards building
        something that matters.
