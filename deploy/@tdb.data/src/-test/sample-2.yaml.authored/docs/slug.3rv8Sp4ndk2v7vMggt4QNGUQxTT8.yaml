  ## If Issues Arise


  Can't reconcile a section:

  - Flag clearly in YAML comments

  - Include both versions (script vs SRT)

  - Ask user for clarification


  SRT timestamp gaps:

  - Note where they occur

  - Ask if content was cut intentionally


  Script sections missing in SRT:

  - Flag for user review

  - May have been cut during recording


  Technical errors:

  - Don't proceed if YAML syntax is broken

  - Fix and validate before outputting


