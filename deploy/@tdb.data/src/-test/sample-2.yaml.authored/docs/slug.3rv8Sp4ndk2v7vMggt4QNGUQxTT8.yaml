      ✅ **[View your slug YAML](computer:///mnt/user-data/outputs/[slug-name]-slug.yaml)**

      **Summary:**
      - Slug: [TITLE]
      - Videos: [N], Duration: ~[MM:SS]
      - Navigation sections: [N]
      - Images: [N] placed
      - Solo slugs: [N or NONE]

      **Key features:**
      - [Notable feature 1]
      - [Notable feature 2]

      **Reconciliation notes:**
      - [Any notable decisions or flagged issues]

      ---

      Ready for review. Let me know if you need adjustments.
  ```


