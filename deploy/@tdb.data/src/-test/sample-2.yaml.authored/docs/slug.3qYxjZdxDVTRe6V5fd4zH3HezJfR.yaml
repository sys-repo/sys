data:
  sequence:
    - video: /:core-videos/core 3.2 fill-in-your-social-lean-canvas.webm.02.mp4.webm
      slice: 00:00..01:09
      script: >
        [00:00:00] In this module, I'll walk you through developing your
        business model in the Social Lean Canvas.

        [00:00:04] You'll get an overview of the whole canvas and we'll guide
        you through filling in each of the key sections.

        [00:00:11] We'll work through the three integrated models.

        [00:00:14] First, your Customer Model - how you create and deliver value
        for your customers.

        [00:00:19] Second, your Impact Model - how your activities will deliver
        meaningful change in the world.

        [00:00:24] And third, your Economic Model. How you can achieve financial
        sustainability and success.

        [00:00:30] Work through each section in order. The program will guide
        you through each step.

        [00:00:34] As you work, use the Venture Example Library to see what
        other ventures did when building their business models.

        [00:00:41] See their choices, their approaches, and their trade-offs.

        [00:00:45] For your first pass through the canvas, keep it simple and
        high level.

        [00:00:49] Getting the structure right is important at the start.

        [00:00:52] You can flesh out the details later on. If you're in the
        early stages of developing your venture, use back of the napkin numbers.

        [00:00:59] What's your best starting guess about how your business model
        will work?

        [00:01:02] Start simple and then add on complexity later on.

        [00:01:08] Good luck.
