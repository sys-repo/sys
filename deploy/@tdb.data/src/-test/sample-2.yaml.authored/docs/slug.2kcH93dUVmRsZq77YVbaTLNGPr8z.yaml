  sequence:
    - video: /:p2p-videos/p2p 2.0 intro1.webm.02.mp4.webm
      slice: 00:00..04:23
      script: >
        [00:00:00] Welcome to Pivoting to Purpose.

        [00:00:02] This is the place to get support and guidance as you develop
        and build your own venture, your own business or social enterprise.

        [00:00:10] The Pivoting to Purpose program will help you take your
        untested ideas and form them into an enterprise that can succeed.

        [00:00:17] It will walk you through designing, validating, and executing
        on a purpose-driven business model.

        [00:00:24] It's a practical step-by-step process with a clear framework,
        tools, and real world examples to help you see a clear path to success,
        and it's completely free.

        [00:00:36] There's something unique happening right now traditional
        employment is being disrupted.

        [00:00:40] Whole industries are changing jobs we thought would be there
        forever are vanishing, but with this disruption, along with all the
        uncertainty, comes opportunity.

        [00:00:50] Opportunity to reinvent how we work in unprecedented ways.

        [00:00:55] This trend of solo founders and small teams building their
        own ventures has been emerging for a while, but the development of AI is
        supercharging what's possible.

        [00:01:04] One person can now build what used to take entire teams.

        [00:01:08] A new kind of entrepreneur is emerging.

        [00:01:10] People are stepping away from traditional jobs and building
        their own ventures.

        [00:01:15] Small, purposeful, and profitable.

        [00:01:18] We call doing this pivoting to purpose.

        [00:01:21] Pivoting to purpose describes making that step into building
        your own thing.

        [00:01:26] A way to generate income, wealth, and financial freedom while
        doing something you actually believe in.

        [00:01:33] Here we focus on two important things.

        [00:01:35] Firstly, size pivoting to purpose is focused on small scale
        ventures can be created by solo founders and very small teams, not high
        growth startups and huge social enterprises, and secondly, this is about
        being purpose driven.

        [00:01:50] Stepping into doing something that matters to you.

        [00:01:53] It helps you make sense of what you're doing, manage the
        risks you're taking, and helps you chart your best course through them
        to success.

        [00:02:01] You might be mid-career and looking to transition out of
        uninspiring work, or you could be self-employed and looking to build a
        venture that will scale your efforts beyond dollars for hours, toil, or
        perhaps you're new to the workforce starting out.

        [00:02:15] And just aren't inspired by the idea of spending the next few
        decades working a job you don't like for people you don't respect in
        service of a mission, you don't believe in any of these sound like you.

        [00:02:26] If so, you're in the right place.

        [00:02:28] This program is here to help you make this pivot.

        [00:02:32] To be clear, this isn't about sleazy internet hustle culture.

        [00:02:36] The internet is full of people promising get rich quick
        approaches and promoting a self-centered culture of win by any means
        necessary.

        [00:02:44] Pivoting to purpose is about honest hustle.

        [00:02:47] Bringing the best of yourself, being smart, being strategic,
        being successful while staying grounded in your values.

        [00:02:54] Building success with your soul intact.

        [00:02:57] It isn't about taking on investors who will push you to only
        think of financial returns.

        [00:03:02] It's a way for you to balance money, a mission you care about
        and a way of life that you want.

        [00:03:09] In a world becoming increasingly uncertain and untrustworthy,
        purpose becomes your advantage.

        [00:03:14] It helps you cut through the noise.

        [00:03:16] Customers of ventures that have purpose at their heart are
        more engaged, more loyal, and more likely to refer others.

        [00:03:23] Purpose isn't just feel good anymore.

        [00:03:25] It's becoming a strategic advantage.

        [00:03:28] Whether you're trying to change the world or just build a
        foundation for your family's happiness, integrating purpose into what
        you're building is now a complete no-brainer.

        [00:03:37] In fact, when you've done it, it will seem crazy to think
        that you could ever build something that didn't embody your purpose and
        values it.

        [00:03:44] In building a venture, you're not creating a job for
        yourself.

        [00:03:47] You're building a machine.

        [00:03:49] In the past, leaving traditional employment meant becoming a
        freelancer or a consultant, swapping the certainty of a job for the
        uncertainty of trading time for money.

        [00:04:00] But pivoting to building a venture is different.

        [00:04:03] You're building a business model that creates value beyond
        your time.

        [00:04:07] A machine that you own that produces more than you could
        produce by yourself.

        [00:04:11] We call this machine a pivot to purpose venture, or P two P
        venture.

        [00:04:16] A scalable, repeatable business model that enables you to
        pivot away from the traditional working world while pursuing things that
        are important to you.
