          solo or small team ventures, but the Social Lean Canvas can handle any
          direction you choose to go in.

          [00:00:52] The framework is universal. Your application of it is
          specific.


          [00:00:56] The canvas weaves together three models that work as a
          system.

          [00:01:00] Your customer model - how your venture creates value for
          customers.

          [00:01:04] Your impact model - the logic for how your venture delivers
          on your purpose.

          [00:01:08] And your economic model - how money flows through your
          venture to make it financially successful.


          [00:01:14] These three models interrelate. They influence each other.

          [00:01:18] Together, they form your complete business model.


          [00:01:21] The P2P program is structured in three modules.

          [00:01:24] Each module builds on the last, and each creates a clear
          deliverable.


          [00:01:30] Module One: Design Your Business Model.

          [00:01:32] The output of this will be your completed Social Lean
          Canvas.

          [00:01:37] This module introduces you to the fundamentals of how to
          design a business model, then guides you through sketching a first
          draft of your idea in the Social Lean Canvas.

          [00:01:46] You'll work through each section of the canvas, mapping
          your idea into a comprehensive business model.

          [00:01:51] By the end, you'll see how all the pieces fit together into
          a single coherent model.


          [00:01:57] Module Two: Improve Your Business Model.

          [00:01:59] The output of this is a strengthened business model with
          clear assumptions.

          [00:02:04] In this module, you'll improve what you've mapped in the
          first module.

          [00:02:07] Work through each model systematically, identifying weak
          points, fixing them, and clarifying your riskiest assumptions.

          [00:02:15] This module makes your business model as strong as possible
          before you start testing it.


          [00:02:20] Module Three: Build Your Strategy.

          [00:02:23] The output of this is a complete validation plan and
          multi-layer strategy.

          [00:02:28] This module works through assessing where you are - your
          current stage of development.

          [00:02:35] Then creating a validation plan for your customer model,
          impact model, and economic model.

          [00:02:42] These specify exactly what you need to do to develop each
          one.

          [00:02:45] And finally we'll build this into a strategy.

          [00:02:48] This layers your business model development, organizational
          development, and capital strategy, all working together in a single
          timeline.

          [00:02:54] By the end, you'll have a clear, flexible roadmap.

          [00:02:57] You'll know what you're doing, when you're doing it, and
          what resources you'll need to get it done.


          [00:03:03] Each module creates a deliverable. Each deliverable feeds
          the next module.

          [00:03:07] Module one gives you your canvas. Module two strengthens
          it, and module three turns it into an executable strategy.

          [00:03:14] Progressive clarity, going from vague idea to concrete
          plan.


          [00:03:19] Ready to go?

          [00:03:21] Let's begin.
