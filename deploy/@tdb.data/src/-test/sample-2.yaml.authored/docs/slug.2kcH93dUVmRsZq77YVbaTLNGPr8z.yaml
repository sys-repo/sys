    - video: /:p2p-videos/p2p 2.0 intro2.webm.02.mp4.webm
      slice: 00:00..03:21
      script: >
        [00:00:00] The Social Lean Canvas system has been developed over more
        than 10 years.

        [00:00:03] It's been used with thousands of social ventures,
        accelerators, and incubator programs.

        [00:00:08] It's the fastest and most reliable way to map, test, and
        build ideas into successful business models.

        [00:00:15] The canvas maps your entire business model, everything,
        visible details, and big picture together.

        [00:00:21] This isn't a narrow methodology that tries to squeeze every
        venture into a one size fits all.

        [00:00:27] The canvas system can support all kinds of entrepreneurs that
        want to take a purpose-driven approach to building a venture.

        [00:00:33] It works for a solo founder creating something they can run
        by themselves.

        [00:00:37] It works for a giant corporation or social enterprise and
        everything in between.

        [00:00:43] In pivoting to purpose, we're focusing on starting small solo
        or small team ventures, but the social lean canvas can handle any
        direction you choose to go in.

        [00:00:52] The framework is universal.

        [00:00:53] Your application of it is specific.

        [00:00:56] The canvas weaves together three models that work as a
        system, your customer model, how your venture creates value for
        customers.

        [00:01:04] Your impact model the logic for how your venture delivers on
        your purpose.

        [00:01:08] and your economic model, how money flows through your venture
        to make it financially successful.

        [00:01:14] These three models interrelate.

        [00:01:16] They influence each other together.

        [00:01:18] They form your complete business model.

        [00:01:21] The P two P program is structured in three modules.

        [00:01:24] Each module builds on the last, and each creates a clear
        deliverable.

        [00:01:30] Module One, design Your Business Model.

        [00:01:32] The output of this will be your completed social lean canvas
        This module introduces you to the fundamentals of how to design a
        business model then guides you through sketching a first draft of your
        idea in the social lean canvas.

        [00:01:46] You'll work through each section of the canvas mapping your
        idea into a comprehensive business model.

        [00:01:51] By the end, you'll see how all the pieces fit together into a
        single coherent model.

        [00:01:57] Module two, improve your business model.

        [00:01:59] The output of this is a strengthen business model with clear
        assumptions.

        [00:02:04] In this module, you'll improve what you've mapped in the
        first module.

        [00:02:07] Work through each model systematically.

        [00:02:10] Identifying weak points, fixing them, and clarifying your
        riskiest assumptions.

        [00:02:15] This module makes your business model as strong as possible
        before you start testing it.

        [00:02:20] Module three, build your strategy.

        [00:02:22] The output of this is a complete validation plan and
        multi-layer strategy.

        [00:02:28] This module works through assessing where you are, your
        current stage of development, then creating a validation plan for your
        customer model, impact model, and economic model.

        [00:02:38] These specify exactly what you need to do to develop each
        one.

        [00:02:42] And finally we'll build this into a strategy.

        [00:02:45] This layers your business model development, organizational
        development, and capital strategy, all working together in a single
        timeline.

        [00:02:54] By the end, you'll have a clear, flexible roadmap.

        [00:02:57] You'll know what you're doing when you're doing it, what
        resources you'll need to get it done.

        [00:03:03] Each module creates a deliverable.

        [00:03:05] each deliverable feeds the next module.

        [00:03:07] Module one gives you your canvas.

        [00:03:09] Module two strengthens it, and module three turns it into an
        executable strategy.

        [00:03:14] Progressive clarity, going from vague idea to concrete plan.

        [00:03:19] Ready to go.

        [00:03:21] Let's begin.
