data:
  sequence:
    - video: /:core-videos/core 2.0-intro1.webm.01-1.mp4.01.webm
      slice: 00:00..02:01
      script: >
        [00:00:00] Welcome to the Social Lean Canvas.

        [00:00:02] This is where you take the ideas in your head and turn them
        into a clear, testable business model that can succeed.

        [00:00:08] I'll walk you through a set of simple steps to map what you
        know, what you suspect, and what you haven't yet articulated into a
        coherent model that fits on a single page.

        [00:00:19] When you've completed your canvas, you'll have a one-page map
        of who you serve, how you create value, how you make money, and how you
        create impact.

        [00:00:28] The Social Lean Canvas is for purpose-driven ventures.

        [00:00:32] Organisations that care about both a business model, a money
        system that keeps your venture alive, and an impact model, a clear logic
        for the change you want to create in the world.

        [00:00:43] This can include social enterprises, community and indigenous
        ventures, cooperatives, non-profits with earned income, mission-led
        startups, solo ventures, and all the other yet-to-be-imagined ways that
        we can use a business model to deliver social or environmental impact.

        [00:01:01] If this is what you're working towards, then the Social Lean
        Canvas is for you.

        [00:01:05] By the time you've finished your Social Lean Canvas, you'll
        have made sense of your ideas.

        [00:01:10] You'll have a clear one-page map of your venture and how it's
        going to work.

        [00:01:14] You'll have a shared language to talk about your idea with
        co-founders, funders, partners and supporters.

        [00:01:22] And you'll have a foundation upon which you can build a clear
        strategy to take your venture forward.

        [00:01:26] The Social Lean Canvas is free and open to everyone.

        [00:01:30] If after you've done your canvas, you want more support to
        improve your model and design your strategy, there's a follow-on program
        called Build.

        [00:01:38] We charge a modest fee for Build to help sustain this work,
        but we also know that a modest fee for one person could be a month's
        salary for another.

        [00:01:46] So if you want to join Build but can't afford to pay for it,
        we've got you covered.

        [00:01:50] No one misses out because of money.

        [00:01:53] People who pay for Build effectively pay it forward.

        [00:01:55] Helping fund places for those who can't afford it, and
        keeping the Social Lean Canvas accessible to anyone who needs it.
