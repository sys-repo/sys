  sequence:
    - video: /:p2p-videos/p2p 3.2.6 conclusion.webm.02.mp4.webm
      slice: 00:00..01:19
      script: >
        [00:00:00] Great. You've filled in your Social Lean Canvas. That's an
        achievement worth acknowledging.

        [00:00:04] Most entrepreneurs never even get this level of clarity.

        [00:00:08] They're just running on faith and instinct and hoping their
        original idea will just work if they build it.

        [00:00:14] You've created a conceptual foundation.

        [00:00:16] Something you can test, improve, and evolve into a successful
        business model.

        [00:00:22] This is rare in the haphazard world of venture building. Well
        done.

        [00:00:27] You have a clear sketch of your business model in one
        place—your Purpose, Customer Model, Impact Model, Economic Model, and
        Key Metrics.

        [00:00:35] All connected and all visible. And you have a tool.

        [00:00:39] You can take this canvas and talk it through with advisors,
        mentors, potential collaborators, other founders.

        [00:00:48] Get their perspectives, find out where your thinking might be
        off, and discover gaps that you hadn't seen.

        [00:00:52] The canvas makes those conversations productive.

        [00:00:55] Instead of vague ideas, you have something concrete to
        discuss and refine.

        [00:01:01] You've built the foundation—the conceptual structure that
        everything else builds on.

        [00:01:06] Now you can build on it.

        [00:01:08] The next step is about improving your model—taking it from
        back of the napkin, initial ideas, and making it something that is worth
        committing your time and effort into developing.
