data:
  sequence:
    - video: /:core-videos/customer model_overview.webm.02.mp4.webm
      slice: 00:00..00:53
      script: >
        [00:00:00] Your customer model outlines how you create value for your
        customers.

        [00:00:04] Creating value for customers that you can get paid for is
        what drives your business model.

        [00:00:10] Your customer model pulls together four key sections of the
        canvas: your customers, the jobs they need done, the unique value
        proposition that they will respond to, and the solution that you will
        give them that they and other of your customers will pay for.

        [00:00:27] Your customer model could be very simple with a single group
        of customers who pay for a single simple product, or it can be much more
        complex, and social enterprises often tend to be more complex than
        traditional ones in the customer model.

        [00:00:43] Developing this customer model is about understanding how
        these four canvas sections come together to form a coherent model of how
        you'll create value for your customers.
      timestamps:
        00:00:00:
          pause: 2s
          title: Customer Model Overview
          image: /:core-images/cm-title.png
          text:
            headline: Customer Model
            tagline: Creating value for customers
        00:00:10:
          pause: 2s
          image: /:core-images/customer-model-overview.png
          text:
            headline: Four Key Sections
            tagline: Integrated customer model
        00:00:15:
          pause: 3s
          text:
            headline: Four Key Sections
            body: |
              - Customers
              - Jobs to Be Done
              - Unique Value Proposition
              - Solution
        00:00:25:
          image: /:core-images/customer-model-overview.png
          text:
            headline: Simple or Complex
            tagline: From single to multiple customer types
        00:00:43:
          image: /:core-images/customer-model-overview.png
          text:
            headline: Coherent Model
            tagline: How sections work together
    - video: /:core-videos/customer model_customers_1.webm.02.mp4.webm
      slice: 00:00..01:10
      script: >
        [00:00:00] Your customers are those people or organizations that you
        need to move to make your business model work.

        [00:00:07] You need to categorize them in two ways. Firstly, your
        customer types, and secondly, your customer segments.

        [00:00:15] Customer types are the different categories of customers who
        play completely different roles in your business model.

        [00:00:23] Some businesses only have one customer type, for example, the
        customer who buys and consumes your product.

        [00:00:29] But in more complex business models, especially in social
        enterprise, there can be several types of customers.

        [00:00:36] For example, users, funders, advertisers, sponsors,
        government buyers, all can be different customer types.

        [00:00:45] With multiple customer types, it's this combination of the
        different customer types working collectively that creates the value
        needed for your business model to work.

        [00:00:56] If you have more than one customer type, try to color code or
        number them in your canvas because each customer type will have a
        correspondingly different job to be done and different unique value
        proposition that you'll have to create for them.
      timestamps:
        00:00:00:
          pause: 2s
          title: Customers
          image: /:core-images/cm-c-highlight.png
