    - video: /:core-videos/customer model_FBexample_jobs to be done.webm.02.mp4.webm
      slice: 00:00..00:38
      script: >
        [00:00:00] Now moving on to the Jobs to Be Done section of their canvas.

        [00:00:05] For the student user customer type, the job they're trying to
        get done might be something like meeting people and making new friends.

        [00:00:13] The existing alternatives to do this job might include
        joining clubs and sports groups, or going to bars and attending parties.

        [00:00:20] For the advertiser type, the job to be done could be finding
        more effective methods of reaching our target audiences.

        [00:00:31] The existing alternatives for this might be untargeted online
        banner advertising, or traditional print and media advertising.
      timestamps:
        00:00:00:
          image: /:core-images/cm-jtbd-highlight.png
          text:
            headline: Facebook's Jobs to Be Done
            tagline: What drives each customer type
        00:00:05:
          pause: 3s
          text:
            headline: Users' Job to Be Done
            body: |
              Job: Meeting people, making new friends

              Existing alternatives:
              - Clubs and sports groups
              - Bars and parties
        00:00:20:
          pause: 3s
          text:
            headline: Advertisers' Job to Be Done
            body: |
              Job: More effective audience reach

              Existing alternatives:
              - Untargeted banner ads
              - Traditional print/media ads
    - video: /:core-videos/customer model_FBexample_UVP.webm.02.mp4.webm
      slice: 00:00..00:35
      script: >
        [00:00:00] Now the unique value proposition.

        [00:00:03] For students, the unique value proposition might be something
        like "easily meet and connect with new friends in a low social risk
        way."

        [00:00:11] For advertisers, it could be "highly targeted advertising
        that guarantees you better engagement and a higher click-through rate."

        [00:00:20] You can see here that the unique value propositions map
        directly to the jobs to be done that each different customer type has.

        [00:00:28] This is how you translate the need your customer has into
        clearly articulated value that you can provide for them.
      timestamps:
