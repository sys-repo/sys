          text:
            headline: Multiple Customer Types
            tagline: Familiar company, complex model
        00:00:21:
          image: /:core-images/customer-model-overview.png
          text:
            headline: Simple Version
            tagline: When they first started
        00:00:29:
          image: /:core-images/customer-model-overview.png
          text:
            headline: Their Vision
            tagline: Largest network on university campuses
    - video: /:core-videos/customer model_FBexample_customers.webm.02.mp4.webm
      slice: 00:00..01:51
      script: >
        [00:00:00] So let's get into it, starting with the customer section of
        their canvas.

        [00:00:04] At the start, Facebook had two different customer types in
        mind.

        [00:00:08] Firstly, users, people who will use the social network, and
        secondly, advertisers, organizations who pay to have their ads viewed by
        Facebook's users.

        [00:00:19] So those are the two distinct types of customers who are
        gonna get completely different types of value out of Facebook.

        [00:00:27] Next, for their customer segments, we zero in on the markets
        within each customer type that Facebook will actually try and serve.

        [00:00:36] For users, they zeroed in on university students as their
        main user customer segment.

        [00:00:41] Of course, as they grew and succeeded, they broadened this
        out to include many more customer segments.

        [00:00:48] But to start with, they were tightly focused on students.

        [00:00:51] The early adopters in the student customer segment were, and
        I'm guessing here, something like dorm room students who are living away
        from home for the first time.

        [00:01:02] These students would likely have more of an immediate social
        need to be fulfilled ahead of other students.

        [00:01:09] For the advertiser customer type, they would zero in on the
        kinds of advertisers who were often targeting students and would value
        Facebook's unique value proposition to do this more effectively.

        [00:01:21] This might include fashion or music industry advertisers, or
        other entertainment industry advertisers.

        [00:01:29] For early adopters in this advertiser customer segment,
        again, they would zero in to find smaller advertising segments that are
        currently working hard to reach students that they can start with.

        [00:01:40] This might be local event promoters who are working hard to
        reach students in a local environment and make them good candidates to
        actually test ideas on.
