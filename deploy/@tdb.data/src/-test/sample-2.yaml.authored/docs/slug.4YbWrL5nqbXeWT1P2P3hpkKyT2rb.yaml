              (Ties together both customer types)
    - video: /:core-videos/customer model_FBexample_conclusion.webm.02.mp4.webm
      slice: 00:00..00:33
      script: >
        [00:00:00] You can see using the simple example of Facebook that all of
        these sections of the canvas need to fit together in a coherent way to
        form the customer model.

        [00:00:09] They need to clearly outline how the customer model creates
        value for customers in a way that Facebook can earn its revenue.

        [00:00:19] The value it creates for its users by getting an important
        job done for them in turn creates the ability for Facebook to sell a
        different kind of value to its advertisers.

        [00:00:27] All of these pieces need to work together to create a
        powerful customer model that can succeed.
