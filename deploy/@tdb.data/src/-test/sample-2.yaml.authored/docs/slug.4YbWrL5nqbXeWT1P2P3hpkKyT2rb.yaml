            tagline: Especially in social enterprise
        00:00:36:
          pause: 3s
          text:
            headline: Customer Type Examples
            body: |
              - Users
              - Funders
              - Advertisers
              - Sponsors
              - Government buyers
        00:00:45:
          image: /:core-images/cm-c-highlight.png
          text:
            headline: Working Collectively
            tagline: Combination creates value
        00:00:56:
          image: /:core-images/cm-c-highlight.png
          text:
            headline: Color Code or Number
            tagline: Track different types through canvas
    - video: /:core-videos/customer model_customers_2.webm.02.mp4.webm
      slice: 00:00..00:59
      script: >
        [00:00:00] For your customer segments, these are the subgroups of
        customers that sit inside each of your customer types. For the canvas,
        sketch out the core customer segment that you're gonna serve for each of
        your customer types.

        [00:00:15] For example, if you have a customer type of user, your main
        user customer segment might be stay-at-home parents.

        [00:00:24] Keep your customer section simple, only include those types
        and segments that you need to make your business model work.

        [00:00:33] Depending on your business model, your participants from your
        impact model might also be classified as customers if they are people
        that you have to move to make your business model work, but if you don't
        rely on them for your business model to succeed, then don't include them
        in your customers section.

        [00:00:50] Any extra customers you include in here that you don't
        actually need will just add unnecessary complexity to your business
        model.
      timestamps:
        00:00:00:
          image: /:core-images/cm-c-highlight.png
          text:
            headline: Customer Segments
            tagline: Subgroups within customer types
        00:00:15:
          image: /:core-images/cm-c-highlight.png
          text:
            headline: Example Segment
            tagline: Users → Stay-at-home parents
        00:00:24:
          pause: 3s
          text:
            headline: Keep It Simple
            body: |
              Only include types and segments you NEED
              Extra customers add unnecessary complexity
        00:00:40:
          image: /:core-images/cm-c-highlight.png
          text:
            headline: Impact Model Participants
            tagline: Include only if needed for model to work
    - video: /:core-videos/customer model_customers_early-adopters.webm.02.mp4.webm
      slice: 00:00..00:47
      script: >
        [00:00:00] Your early adopters are the small subgroup of your customer
        segments who you think will have the strongest desire for your solution.

        [00:00:09] For example, for our customer type of user and our customer
        segment of stay-at-home parents, our early adopters might be
        stay-at-home parents who have just had their first child.

        [00:00:22] These will be the customers who you'll engage with first to
        learn from and test out your ideas.

        [00:00:27] Only include early adopters for customer types that will be
        in significant numbers.

        [00:00:34] If the customer type is, for example, a single government
        funder, then there's no need to identify early adopters here because
        they're a single customer. They don't represent a larger market that
        you're planning on selling to.
      timestamps:
        00:00:00:
          image: /:core-images/cm-c-highlight.png
          text:
            headline: Early Adopters
            tagline: Strongest desire for your solution
        00:00:09:
          image: /:core-images/cm-c-highlight.png
          text:
            headline: Example Early Adopters
            tagline: Stay-at-home parents with first child
        00:00:22:
          image: /:core-images/cm-c-highlight.png
          text:
            headline: Learn and Test
            tagline: Engage with them first
        00:00:27:
          image: /:core-images/cm-c-highlight.png
          text:
            headline: Significant Numbers Only
            tagline: Not for single customer types
    - video: /:core-videos/customer model_jobs to be done.webm.02.mp4.webm
      slice: 00:00..00:51
      script: >
        [00:00:00] Filling in the Jobs to Be Done section of the canvas is about
        understanding what's motivating your customers.

        [00:00:07] What will drive them to engage with your solution?

        [00:00:10] What job is your customer going to hire your product or
        service to do for them?

        [00:00:16] Make sure that you go deeper here than just the obvious need
        that the customer has.

        [00:00:21] Dig deep to find the particular thing that you will be able
        to do for them that isn't currently available to them from someone else.

        [00:00:29] Identify at least one key job to be done for each of your
        customer types, and then color code or number each of them so that you
        can see what customer type they relate to.

        [00:00:41] Clearly identifying and understanding the jobs that your
        customers need done is really important. It's the basis for how your
        business model will create value for them.
      timestamps:
        00:00:00:
          pause: 2s
          title: Jobs to Be Done
          image: /:core-images/cm-jtbd-highlight.png
          text:
            headline: Jobs to Be Done
            tagline: Understanding customer motivation
        00:00:07:
          image: /:core-images/cm-jtbd-highlight.png
          text:
            headline: What Drives Them?
            tagline: Why they'll engage with your solution
        00:00:16:
          image: /:core-images/cm-jtbd-highlight.png
          text:
            headline: Go Deeper
            tagline: Beyond the obvious need
        00:00:21:
          image: /:core-images/cm-jtbd-highlight.png
          text:
            headline: Your Unique Contribution
            tagline: What you do that others don't
        00:00:29:
          pause: 3s
          text:
            headline: Key Actions
            body: |
              - One key job per customer type
              - Color code or number each
              - Link to customer types
        00:00:41:
          image: /:core-images/cm-jtbd-highlight.png
          text:
            headline: Basis for Value Creation
            tagline: Really important to get right
    - video: /:core-videos/customer model_jobs to be done_existing
        alternatives.webm.02.mp4.webm
      slice: 00:00..00:47
      script: >
        [00:00:00] Existing alternatives show how your future customers are
        currently getting these jobs done. And this is important for two main
        reasons.

        [00:00:08] Firstly, it shows evidence of customer need. If your
        potential customers are already engaging with an existing alternative,
        it shows that the customer actually does want this job to be done in
        real life.

        [00:00:21] Secondly, it starts to outline who your competitors might be,
        showing you who is already out there doing these jobs for your customer.

        [00:00:30] You might also find that you're competing against an existing
        alternative of just doing nothing.

        [00:00:36] This is important to identify early because if your future
        customers are not currently trying to get these jobs done, then it could
        mean that they don't really care about getting them done after all.
      timestamps:
        00:00:00:
          image: /:core-images/cm-jtbd-highlight.png
          text:
            headline: Existing Alternatives
            tagline: How customers currently get jobs done
        00:00:08:
          text:
            headline: Two Main Reasons
            body: |
              1. Evidence of customer need
              Real engagement shows real desire

              2. Outlines potential competitors
              Who's already doing these jobs?
        00:00:25:
          image: /:core-images/cm-jtbd-highlight.png
          text:
            headline: “Do Nothing” Alternative
            tagline: Important to identify early
        00:00:36:
          image: /:core-images/cm-jtbd-highlight.png
          text:
            headline: Test Real Need
            tagline: Do they actually care?
    - video: /:core-videos/customer model_UVP.webm.02.mp4.webm
      slice: 00:00..00:58
      script: >
        [00:00:00] Your unique value proposition describes the benefits that
        your customers are gonna get from using your product or service.

        [00:00:07] A UVP is based on the particular job that your customer is
        trying to get done and the special way that you are gonna do this job
        for them.

        [00:00:16] This is not the same thing as the solution section of the
        canvas where you describe your product or service.

        [00:00:23] This is about describing the benefit that your customer will
        get from using your product or service.

        [00:00:29] If you have more than one customer type, you will have a
        different job to be done for each customer type, and likewise, you'll
        have a different unique value proposition for each as well.

        [00:00:40] Number or color code these in the same way that you did in
        the Jobs to Be Done section.

        [00:00:46] The unique value proposition section is where you demonstrate
        that you have deeply understood your customers, you have understood what
        they're trying to achieve, what value they're trying to get, and how to
        talk to them about it.
      timestamps:
        00:00:00:
          pause: 2s
          title: Unique Value Proposition
          image: /:core-images/cm-uvp-highlight.png
          text:
            headline: Unique Value Proposition
            tagline: Benefits customers will get
        00:00:07:
          image: /:core-images/cm-uvp-highlight.png
          text:
            headline: Based on the Job
            tagline: Special way you do it for them
        00:00:16:
          image: /:core-images/cm-uvp-highlight.png
          text:
            headline: Not the Solution
            tagline: The benefit, not the product
        00:00:29:
          pause: 2s
          text:
            headline: Multiple Customer Types
            body: |
              Different job per type
              Different UVP per type
              Number or color code consistently
        00:00:46:
          image: /:core-images/cm-uvp-highlight.png
          text:
            headline: Deep Customer Understanding
            tagline: What they want and how to talk to them
    - video: /:core-videos/customer model_solution.webm.02.mp4.webm
      slice: 00:00..00:46
      script: >
        [00:00:00] The last section to fill in in your customer model is the
        solution section.

        [00:00:04] This is the part of the canvas where you describe what your
        enterprise actually does, your product or service.

        [00:00:11] Your solution is what's gonna deliver the value to your
        customers in a way that at least some of them will pay for.

        [00:00:18] As well as this, your solution needs to deliver the social or
        environmental impact that's mapped out in your impact model.

        [00:00:25] So make sure that you describe the parts of your solution
        that will deliver the activities in your impact model.

        [00:00:32] Keep the description of your solution simple and high level.

        [00:00:36] You don't need to go into great detail, but make sure that
        you cover off the key aspects of it so that it clearly shows both how
        you're gonna create customer value and impact.
      timestamps:
        00:00:00:
          pause: 2s
          title: Solution
          image: /:core-images/cm-sol-highlight.png
          text:
            headline: Solution
            tagline: What your enterprise actually does
        00:00:11:
          image: /:core-images/cm-sol-highlight.png
          text:
            headline: Delivers Value
            tagline: In a way customers will pay for
        00:00:18:
          pause: 2s
          text:
            headline: Delivers Impact Too
            body: |
              Solution must deliver both:
              - Customer value
              - Social/environmental impact
        00:00:32:
          image: /:core-images/cm-sol-highlight.png
          text:
            headline: Simple and High Level
            tagline: Cover key aspects clearly
    - video: /:core-videos/customer model_FBexample_intro.webm.02.mp4.webm
      slice: 00:00..00:35
      script: >
        [00:00:00] As a way of demonstrating how the customer model works, let's
        walk through an example using the early days of Facebook and their
        customer model.

        [00:00:08] Now, Facebook isn't an impact-driven organization, but
        they'll still be useful here.

        [00:00:14] They're a company you should already be familiar with, as
        well as being an example of one that has more than one customer type.

        [00:00:21] For this example, we're gonna talk through the simple version
        of Facebook from when they first started out, not the behemoth that they
        are today.

        [00:00:29] When they started, their vision was simple: become the
        largest social network on university campuses.
      timestamps:
        00:00:00:
          pause: 2s
          title: Facebook Example
          image: /:core-images/facebook-logo.jpg
