    - video: /:core-videos/customer model_FBexample_solution.webm.02.mp4.webm
      slice: 00:00..00:27
      script: >
        [00:00:00] And for the solution section, their solution description
        needs to tie together both of their customer types.

        [00:00:07] And also if Facebook was an impact-driven enterprise, it
        would need to describe their impact activities as well.

        [00:00:14] Facebook's early solution description would be something
        like: "An online social media application that creates a student social
        network and that also provides a highly targeted advertising platform."
      timestamps:
        00:00:00:
          image: /:core-images/cm-sol-highlight.png
