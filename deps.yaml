#
#  System Dependencies ("imports")
#
#        ./💦
#          |            deno.json
#          |(write)  →  imports.json
#          |(write)  →  package.json
#
#  This is the "single-source-of-truth" with regards to dependencies and versioning.
#  Import maps (in the `deno.json` and `package.json` files) are auto-generated
#  from this config definition.
#
#  Also, as a programmatic API, other downstream dependencies
#  (such as template generators, see `@sys/tmpl`) use this definition
#  file to calculate the "latest" versions to inject into, say,
#  a `package.json` file for a scaffolded project.
#
groups:
  std/deno:
    # Deno standard libs ("std"):
    - import: jsr:@std/datetime@0.225.7
    - import: jsr:@std/dotenv@0.225.6
    - import: jsr:@std/encoding@1.0.10
    - import: jsr:@std/jsonc@1.0.2
    - import: jsr:@std/fs@1.0.22
    - import: jsr:@std/http@1.0.24
      subpaths: [file-server]
    - import: jsr:@std/path@1.1.4
      subpaths: [join, windows/join, posix/join]
    - import: jsr:@std/semver@1.0.8
    - import: jsr:@std/uuid@1.1.0

  std/testing:
    - import: jsr:@std/testing@1.0.17
      subpaths: [bdd, time]
    - import: npm:chai@6.2.2
      subpaths: ['/', 'chai.js']
    - import: npm:fake-indexeddb@6.2.5
      subpaths: ['auto']

  automerge:
    # https://automerge.org
    - import: npm:@automerge/automerge@3.2.4
    - import: npm:@automerge/automerge-repo@2.5.1
    - import: npm:@automerge/automerge-repo-network-websocket@2.5.1
    - import: npm:@automerge/automerge-repo-storage-indexeddb@2.5.1
    - import: npm:@automerge/automerge-repo-storage-nodefs@2.5.1
    - import: npm:@automerge/prosemirror@0.1.0

  crypto:
    - import: npm:@noble/hashes@2.0.1
      subpaths: [sha2.js, legacy.js]

  schema:
    - import: npm:@sinclair/typebox-codegen@0.11.1
    - import: npm:@sinclair/typebox@0.34.48
      subpaths: ['value', 'errors']

  build/tools/vite:
    - import: npm:@vitejs/plugin-react@5.1.4
    - import: npm:@deno/vite-plugin@1.0.6
    - import: npm:rollup@4.57.1
    - import: npm:vite@7.3.1
    - import: npm:vite-plugin-wasm@3.5.0
    - import: npm:rollup-plugin-visualizer@6.0.5

  dev/tools:
    - import: npm:prettier@3.8.1

  ui/react:
    - import: npm:react@19.2.4
    - import: npm:react-dom@19.2.4
    - import: npm:@types/react@19.2.14
    - import: npm:@types/react-dom@19.2.3
    - import: npm:@testing-library/react@16.3.2

  ui/monaco:
    # https://microsoft.github.io/monaco-editor
    - import: npm:@monaco-editor/react@4.7.0
    - import: npm:monaco-editor@0.55.1

  ui/prosemirror:
    - import: npm:prosemirror-model@1.25.4
    - import: npm:prosemirror-state@1.4.4
    - import: npm:prosemirror-view@1.41.6
      subpaths: [style/prosemirror.css]
    - import: npm:prosemirror-example-setup@1.2.3
      subpaths: [style/style.css]
    - import: npm:prosemirror-schema-basic@1.2.4

  ai:
    - import: npm:ai@6.0.86
    - import: npm:@ai-sdk/openai@3.0.29
    - import: npm:ollama-ai-provider@1.2.0
    - import: npm:ollama@0.6.3
    - import: npm:gpt-tokenizer@3.4.0
    - import: npm:@elevenlabs/elevenlabs-js@2.35.0

  yaml:
    - import: npm:yaml@2.8.2
      subpaths: [types]

deno.json:
  - group: std/deno
  - group: std/testing
  - group: crypto
  - group: schema
  - group: ai
  - group: automerge
  - group: ui/monaco
  - group: ui/prosemirror
  - group: yaml

  # CLI tools:
  - import: jsr:@cliffy/keypress@1.0.0
  - import: jsr:@cliffy/prompt@1.0.0
  - import: jsr:@cliffy/table@1.0.0

  # Sundry NPM:
  - import: npm:approx-string-match@2
  - import: npm:date-fns@4
  - import: npm:diff@8.0.3
  - import: npm:fast-json-patch@3.1.1
  - import: npm:happy-dom@20.6.1
  - import: npm:hash-it@7.0.2
  - import: npm:ignore@7.0.5
  - import: npm:ora@9.3.0
  - import: npm:@preact/signals-core@1.13.0
  - import: npm:pretty-bytes@7.1.0
  - import: npm:ramda@0.32.0
  - import: npm:@types/ramda@0.31.1
  - import: npm:rxjs@7.8.2
    subpaths: [operators]
  - import: npm:strip-ansi@7.1.2
  - import: npm:tinycolor2@1.6.0
  - import: npm:ts-essentials@10.1.1

  # Websockets:
  - import: npm:ws@8.19.0
  - import: npm:@types/ws@8.18.1

  # Browser:
  - import: npm:csstype@3.2.3
  - import: npm:ua-parser-js@2.0.9

  # UI:
  - import: npm:@svgdotjs/svg.js@3.2.5
  - import: npm:react-error-boundary@6.1.1
  - import: npm:react-inspector@9.0.0
  - import: npm:react-spinners@0.17.0
  - import: npm:@preact/signals-react@3.9.0

package.json:
  - group: build/tools/vite
    dev: true
  - group: dev/tools
    dev: true

  # UI:
  - group: ui/react
  - import: npm:react-icons@5.5.0
  - import: npm:motion@12.34.0
  - import: npm:hono@4.11.9
