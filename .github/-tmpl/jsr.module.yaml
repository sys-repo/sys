- name: publish module → "NAME"
  if: ${{ github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) }}
  ENV_BLOCK
  run: |
    cd PATH
    deno task test --parallel
    for i in 1 2 3; do
        if deno publish --allow-dirty; then
          exit 0
        fi
        echo "publish failed (attempt $i), retrying in 5s..."
        sleep 5
    done
    echo "publish failed after 3 attempts"
    exit 1
