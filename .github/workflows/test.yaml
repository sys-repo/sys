name: test
on:
  push:
    branches:
      - main
      - phil-work
    paths-ignore:
      - .github/workflows/jsr.yaml

jobs:
  deno:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: dev
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "@sys/types"
            path: code/sys/types
          - name: "@sys/std"
            path: code/sys/std
          - name: "@sys/color"
            path: code/sys/color
          - name: "@sys/ui-css"
            path: code/sys.ui/ui-css
          - name: "@sys/cli"
            path: code/sys/cli
          - name: "@sys/crdt-t"
            path: code/sys/crdt.t
          - name: "@sys/crypto"
            path: code/sys/crypto
          - name: "@sys/event"
            path: code/sys/event
          - name: "@sys/ui-state"
            path: code/sys.ui/ui-state
          - name: "@sys/immutable"
            path: code/sys/immutable
          - name: "@sys/ui-dom"
            path: code/sys.ui/ui-dom
          - name: "@sys/fs"
            path: code/sys/fs
          - name: "@sys/net"
            path: code/sys/net
          - name: "@sys/process"
            path: code/sys/process
          - name: "@sys/driver-process"
            path: code/sys.driver/driver-process
          - name: "@sys/driver-signer"
            path: code/sys.driver/driver-signer
          - name: "@sys/http"
            path: code/sys/http
          - name: "@sys/registry"
            path: code/sys/registry
          - name: "@sys/skills"
            path: code/sys/skills
          - name: "@sys/testing"
            path: code/sys/testing
            browser: true
          - name: "@sys/ui-react"
            path: code/sys.ui/ui-react
          - name: "@sys/ui-react-devharness"
            path: code/sys.ui/ui-react-devharness
          - name: "@sys/text"
            path: code/sys/text
          - name: "@sys/tmpl-engine"
            path: code/sys/tmpl-engine
          - name: "@sys/yaml"
            path: code/sys/yaml
          - name: "@sys/esm"
            path: code/sys/esm
          - name: "@sys/schema"
            path: code/sys/schema
          - name: "@sys/model"
            path: code/sys.model/model
          - name: "@sys/model-slug"
            path: code/sys.model/model-slug
          - name: "@sys/ui-react-components"
            path: code/sys.ui/ui-react-components
          - name: "@sys/driver-automerge"
            path: code/sys.driver/driver-automerge
          - name: "@sys/driver-monaco"
            path: code/sys.driver/driver-monaco
          - name: "@sys/driver-prosemirror"
            path: code/sys.driver/driver-prosemirror
          - name: "@sys/driver-stripe"
            path: code/sys.driver/driver-stripe
          - name: "@sys/ui-factory"
            path: code/sys.ui/ui-factory
          - name: "@sys/dev"
            path: code/sys.dev
          - name: "@sys/crdt"
            path: code/sys/crdt
          - name: "@sys/workspace"
            path: code/sys/workspace
          - name: "@sys/driver-deno"
            path: code/sys.driver/driver-deno
          - name: "@sys/tmpl"
            path: code/-tmpl
          - name: "@sys/driver-agent"
            path: code/sys.driver/driver-agent
          - name: "@sys/driver-vite"
            path: code/sys.driver/driver-vite
          - name: "@sys/tools"
            path: code/sys.tools
          - name: "@tdb/data"
            path: deploy/@tdb.data
          - name: "@tdb/slc"
            path: deploy/@tdb.slc
          - name: "@tdb/slc-fs"
            path: deploy/@tdb.slc.fs
          - name: "@tdb/slc-std"
            path: deploy/@tdb.slc.std
          - name: "@tdb/edu-slug"
            path: deploy/@tdb.edu.slug
          - name: "@sample/proxy"
            path: deploy/sample.proxy
    steps:
      - uses: actions/checkout@v5
      - name: 'Install ESM Runtime: Deno 2.x'
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.13
      - name: Install Dependencies
        run: |
          max_attempts=3
          for attempt in $(seq 1 $max_attempts); do
              if deno task install; then
                exit 0
              fi
              if [ "$attempt" -lt "$max_attempts" ]; then
                delay=$((5 * 2 ** (attempt - 1)))
                echo "dependency install failed (attempt $attempt/$max_attempts), retrying in ${delay}s..."
                sleep "$delay"
              fi
          done
          echo "dependency install failed after $max_attempts attempts"
          exit 1
      - name: Workspace Info
        run: deno task info
      - name: Deno Info
        run: deno info && deno --version
      - name: 'Install Browser Runtime: Chrome'
        if: ${{ matrix.browser == true }}
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Configure Browser Runtime
        if: ${{ matrix.browser == true }}
        run: echo "CHROME_BIN=${{ steps.setup-chrome.outputs.chrome-path }}" >> "$GITHUB_ENV"

      - name: Verify workspace graph
        run: deno task check:graph

      - name: test module → "${{ matrix.name }}"
        run: |
          cd ${{ matrix.path }}
          deno task test
