name: test
on:
  push:
    branches:
      - main
      - phil-work

jobs:
  deno:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: dev
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "@sys/driver-vite"
            path: code/sys.driver/driver-vite
    steps:
      - uses: actions/checkout@v3
      - name: 'Install ESM Runtime: Deno 2.x'
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.7.4
      - name: Install Dependencies
        run: deno task install
      - name: Task Help
        run: deno task help
      - name: Deno Info
        run: deno info && deno --version
      - name: System Info
        run: deno task help
      - name: test module → "${{ matrix.name }}"
        run: |
          cd ${{ matrix.path }}
          deno task test
