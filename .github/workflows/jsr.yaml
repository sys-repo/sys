name: ci

on:
  push:
    branches:
      - main
      - phil-*

jobs:
  deno:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # The OIDC/ID token is used for authentication with JSR.
    environment: dev
    env:
      TEST_SAMPLE: ${{ vars.TEST_SAMPLE }}

    steps:
      - uses: actions/checkout@v3

      - name: 'Guard: no bidi/hidden Unicode chars'
        run: .github/-scripts/Task.-prep.check-no-bidi.sh

      - name: 'Install ESM Runtime: Deno 2.x'
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.5.x

      - name: 'Install ES Modules from JSR: https://jsr.io/@sys'
        run: deno task help

      - name: Deno Info
        run: deno info && deno --version

      - name: System Info
        run: deno task help


      - name: publish module → "@sys/types"
        if: ${{ github.event_name == 'push' }}
        env: &publish-secrets
          DENO_SUBHOSTING_ACCESS_TOKEN: ${{ secrets.DENO_SUBHOSTING_ACCESS_TOKEN }}
          DENO_SUBHOSTING_DEPLOY_ORG_ID: ${{ vars.DENO_SUBHOSTING_DEPLOY_ORG_ID }}
          PRIVY_APP_ID: ${{ vars.PRIVY_APP_ID }}
          PRIVY_APP_SECRET: ${{ secrets.PRIVY_APP_SECRET }}
        run: |
          cd code/sys/types
          deno task test --parallel
          for i in 1 2 3; do
              if deno publish --allow-dirty; then
                exit 0
              fi
              echo "publish failed (attempt $i), retrying in 5s..."
              sleep 5
          done
          echo "publish failed after 3 attempts"
          exit 1

      - name: publish module → "@sys/std"
        if: ${{ github.event_name == 'push' }}
        env:
          <<: *publish-secrets
