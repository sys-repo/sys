name: ci

on:
  push:
    branches:
      - main
      - phil-work

jobs:
  deno:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # The OIDC/ID token is used for authentication with JSR.
    environment: dev
    env:
      TEST_SAMPLE: ${{ vars.TEST_SAMPLE }}
      DENO_SUBHOSTING_ACCESS_TOKEN: ${{ secrets.DENO_SUBHOSTING_ACCESS_TOKEN }}
      DENO_SUBHOSTING_DEPLOY_ORG_ID: ${{ vars.DENO_SUBHOSTING_DEPLOY_ORG_ID }}
      PRIVY_APP_ID: ${{ vars.PRIVY_APP_ID }}
      PRIVY_APP_SECRET: ${{ secrets.PRIVY_APP_SECRET }}

    steps:
      - uses: actions/checkout@v3

      - name: 'Install ESM Runtime: Deno 2.x'
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.5.x

      - name: 'Install ES Modules from JSR: https://jsr.io/@sys'
        run: deno task help

      - name: Deno Info
        run: deno info && deno --version

      - name: System Info
        run: deno task help


      - name: publish module → "@sys/tmpl"
        run: |
          cd code/-tmpl
          deno task test --trace-leaks
          max_attempts=5
          for attempt in $(seq 1 $max_attempts); do
              if deno publish --allow-dirty; then
                exit 0
              fi
              if [ "$attempt" -lt "$max_attempts" ]; then
                delay=$((5 * 2 ** (attempt - 1)))
                echo "publish failed (attempt $attempt/$max_attempts), retrying in ${delay}s..."
                sleep "$delay"
              fi
          done
          echo "publish failed after $max_attempts attempts"
          exit 1

      - name: publish module → "@sys/tools"
        run: |
          cd code/sys.tools
          deno task test --trace-leaks
          max_attempts=5
          for attempt in $(seq 1 $max_attempts); do
              if deno publish --allow-dirty; then
                exit 0
              fi
              if [ "$attempt" -lt "$max_attempts" ]; then
                delay=$((5 * 2 ** (attempt - 1)))
                echo "publish failed (attempt $attempt/$max_attempts), retrying in ${delay}s..."
                sleep "$delay"
              fi
          done
          echo "publish failed after $max_attempts attempts"
          exit 1
