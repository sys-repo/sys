name: build
on:
  push:
    branches:
      - main
      - phil-work
    paths-ignore:
      - .github/workflows/jsr.yaml

jobs:
  deno:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: dev
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "@sys/ui-react-devharness"
            path: code/sys.ui/ui-react-devharness
          - name: "@sys/ui-react-components"
            path: code/sys.ui/ui-react-components
          - name: "@sys/driver-automerge"
            path: code/sys.driver/driver-automerge
          - name: "@sys/driver-monaco"
            path: code/sys.driver/driver-monaco
          - name: "@sys/driver-prosemirror"
            path: code/sys.driver/driver-prosemirror
          - name: "@sys/driver-stripe"
            path: code/sys.driver/driver-stripe
          - name: "@sys/ui-factory"
            path: code/sys.ui/ui-factory
          - name: "@sys/dev"
            path: code/sys.dev
          - name: "@sys/crdt"
            path: code/sys/crdt
          - name: "@sys/driver-agent"
            path: code/sys.driver/driver-agent
          - name: "@tdb/slc"
            path: deploy/@tdb.slc
          - name: "@tdb/slc-data"
            path: deploy/@tdb.slc.data
          - name: "@tdb/slc-fs"
            path: deploy/@tdb.slc.fs
          - name: "@tdb/slc-std"
            path: deploy/@tdb.slc.std
          - name: "@tdb/edu-slug"
            path: deploy/@tdb.edu.slug
    steps:
      - uses: actions/checkout@v5
      - name: 'Install ESM Runtime: Deno 2.x'
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.12
      - name: Install Dependencies
        run: |
          max_attempts=3
          for attempt in $(seq 1 $max_attempts); do
              if deno task install; then
                exit 0
              fi
              if [ "$attempt" -lt "$max_attempts" ]; then
                delay=$((5 * 2 ** (attempt - 1)))
                echo "dependency install failed (attempt $attempt/$max_attempts), retrying in ${delay}s..."
                sleep "$delay"
              fi
          done
          echo "dependency install failed after $max_attempts attempts"
          exit 1
      - name: Workspace Info
        run: deno task info
      - name: Deno Info
        run: deno info && deno --version
      - name: build module → "${{ matrix.name }}"
        run: |
          cd ${{ matrix.path }}
          deno task build
