summary: |
  A Cell is a folder-shaped metamedium whose DSL stores
  meaning and whose meaning can be interpreted, viewed, and
  validly rewritten within the folder that bounds it.

usage:
  - deno run jsr:@sys/cell --help
  - deno run -RW jsr:@sys/cell init [dir]
  - deno run jsr:@sys/cell dsl

commands:
  - name: init
    text: create the minimal Cell folder contract
  - name: dsl
    text: show the Cell edit language; acts, owners, and mappings

options:
  - name: -h, --help
    text: show help
