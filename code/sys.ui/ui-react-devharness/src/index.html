<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      :root {
        --app-loading-bg: #fff;
        --app-loading-fg: #000;
      }
      html,
      body {
        height: 100%;
        margin: 0;
        background: var(--app-loading-bg);
      }
      body {
        font-family: ui-sans-serif, system-ui, sans-serif;
      }
      .app-loading {
        min-height: 100vh;
        display: grid;
        place-items: center;
        color: var(--app-loading-fg);
        font-size: 20px;
        user-select: none;
        animation: app-loading-pulse 1.6s ease-in-out infinite;
      }
      @keyframes app-loading-pulse {
        0%, 100% { opacity: 0.2; }
        50% { opacity: 0.6; }
      }
      @media (prefers-reduced-motion: reduce) {
        .app-loading {
          animation: none;
        }
      }
    </style>
    <title>loading...</title>
  </head>
  <body>
    <div id="root"><div class="app-loading">loading...</div></div>
    <script type="module" src="./-test/entry.tsx"></script>
  </body>
</html>
